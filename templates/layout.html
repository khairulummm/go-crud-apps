{{define "base"}}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{.Title}} — GoCRUD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222636;
      --border: #2e3349;
      --accent: #00d4aa;
      --accent-dim: rgba(0,212,170,0.12);
      --danger: #ff5e5e;
      --danger-dim: rgba(255,94,94,0.12);
      --text: #e8eaf0;
      --text-muted: #7b82a0;
      --success: #5ee89a;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-brand span { color: var(--text); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0f1117;
    }
    .btn-primary:hover { background: #00bfa8; }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid transparent;
    }
    .btn-danger:hover { background: var(--danger); color: white; }

    .btn-edit {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid transparent;
    }
    .btn-edit:hover { background: var(--accent); color: #0f1117; }

    main { padding: 2rem; max-width: 1100px; margin: 0 auto; }

    .alert {
      padding: 0.85rem 1.2rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .alert-success { background: rgba(94,232,154,0.1); border: 1px solid var(--success); color: var(--success); }
    .alert-error   { background: var(--danger-dim); border: 1px solid var(--danger); color: var(--danger); }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 4rem;
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">Go<span>CRUD</span></a>
  <a href="/products/create" class="btn btn-primary">+ Tambah Produk</a>
</nav>

<main>
  {{template "content" .}}
</main>

<footer>
  Dibuat dengan ❤️ menggunakan Go + SQLite
</footer>

</body>
</html>
{{end}}
